<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Architecture & VRAM Calculator</title>
    <style>
      /* Fixed popup width; columns stack on narrow screens */
      body { margin: 0; min-width: 460px; }
      @media (max-width: 820px) {
        .app { flex-direction: column; }
        .sidebar { width: 100%; flex: none; position: static; max-height: none; border-right: none; border-bottom: 1px solid var(--border); }
        .main { max-height: none; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
